services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag-backend
    restart: unless-stopped
    volumes:
      # Persist data between restarts
      - ./models:/app/models
      - ./documents:/app/documents
      - ./csv_data:/app/csv_data
      - ./markdown_docs:/app/markdown_docs
      - ./parent_store_sqlite:/app/parent_store_sqlite
      - ./qdrant_db:/app/qdrant_db
      - ./csv_metadata:/app/csv_metadata
      - ./csv_table_index:/app/csv_table_index
      - ./database:/app/database
    environment:
      - PYTHONUNBUFFERED=1
    # No ports exposed to host — only accessible via frontend proxy
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rag-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend